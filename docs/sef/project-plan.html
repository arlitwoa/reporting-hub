<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SEF | Integrated Project Plan</title>
  <style>
:root {
  color-scheme: light;
  --page-bg: #f4f5f7;
  --card-bg: #ffffff;
  --border: #dfe1e6;
  --text: #172b4d;
  --muted: #5e6c84;
  --accent-bg: #deebff;
  --accent-text: #0052cc;
  --blue: #0052cc;
  --green: #00875a;
  --red: #de350b;
  --amber: #ff8b00;
  --purple: #6554c0;
}
body {
  margin: 0;
  background: var(--page-bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
}
body::before {
  content: "";
  display: block;
  height: 8px;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--green));
}
.report-shell { max-width: 1280px; margin: 0 auto; padding: 28px 32px 40px; }
.report-header, .report-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(9, 30, 66, 0.08);
  padding: 24px;
  margin-bottom: 24px;
}
.report-header h1 {
  margin: 0 0 8px;
  font-size: 26px;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--text);
}
.report-subtitle {
  margin: 0 0 16px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}
.report-subtitle a {
  color: var(--blue);
  font-weight: 600;
  text-decoration: none;
}
.report-subtitle a:hover { text-decoration: underline; }
.section-l1 { margin: 0 0 12px; font-size: 18px; line-height: 1.35; color: var(--text); }
.section-l2 a { font-weight: 700; }
p, li, td, th { font-size: 14px; line-height: 1.55; color: var(--text); }
.report-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.report-meta-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fafbfc;
  padding: 12px 14px;
}
.report-meta-card dt {
  margin: 0 0 4px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.report-meta-card dd { margin: 0; font-size: 20px; font-weight: 700; color: var(--text); }
.health-pill {
  display: inline-block;
  border-radius: 3px;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  padding: 4px 8px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.health-pill.green { background: var(--green); }
.health-pill.amber { background: var(--amber); }
.health-pill.red { background: var(--red); }
.health-pill.neutral { background: var(--neutral); }
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
th, td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; }
tr:last-child td { border-bottom: none; }
th { background: #fafbfc; color: var(--muted); font-size: 12px; font-weight: 700; }
a { color: var(--blue); font-weight: 600; text-decoration: none; }
a:hover { text-decoration: underline; }
code { font-size: 12px; color: var(--text); background: #f4f5f7; padding: 1px 4px; border-radius: 3px; }
.num { text-align: right; }
tr.slice-inactive td {
  color: #a5adba;
}
tr.slice-inactive a {
  color: #8993a4;
}
tr.slice-squad td:first-child {
  padding-left: 28px;
  color: var(--muted);
  font-size: 13px;
}
tr.slice-squad td {
  background: #fafbfc;
}
tr.slice-squad a {
  font-weight: 500;
}
abbr.metric-tip,
abbr.release-code {
  text-decoration: none;
  cursor: help;
}
abbr.metric-tip .health-pill {
  cursor: help;
}
th abbr.metric-tip,
.report-meta-card dt abbr.metric-tip {
  color: inherit;
  font-size: inherit;
  font-weight: inherit;
  letter-spacing: inherit;
  text-transform: inherit;
}
tr.row-projected td {
  color: #a5adba;
}
tr.row-projected a {
  color: #8993a4;
}
td.pending-metric {
  color: #a5adba;
}
td.pending-metric a {
  color: #8993a4;
}
.chart-wrap {
  overflow-x: auto;
  overflow-y: hidden;
  max-width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  padding: 4px 0;
}
.chart-wrap svg { display: block; min-width: 920px; }
.report-shell .chart-wrap {
  overflow-x: hidden;
}
.report-shell .chart-wrap svg {
  display: block;
  width: 100%;
  height: auto;
  min-width: 0;
  max-width: 100%;
}
.chart-wrap-timeline {
  overflow-y: auto;
  max-height: 720px;
}
.chart-wrap-timeline svg a {
  cursor: pointer;
}
.chart-wrap-timeline svg a text {
  text-decoration: underline;
}
.chart-key {
  margin: 12px 0 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #ffffff;
  padding: 12px 14px;
}
.chart-key-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin: 12px 0 0;
  align-items: stretch;
}
.chart-key-wrap > .chart-key,
.chart-key-wrap > .chart-milestones {
  flex: 1 1 280px;
  margin: 0;
}
.chart-milestones {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #ffffff;
  padding: 12px 14px;
}
.chart-key-title {
  margin: 0 0 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}
.chart-key-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.legend-swatch {
  display: inline-block;
  width: 16px;
  height: 12px;
  margin-right: 6px;
  vertical-align: middle;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-swatch.sprint-a { background: #deebff; border: 1px solid #85a9ff; }
.legend-swatch.sprint-b { background: #e3fcef; border: 1px solid #57d9a3; }
.legend-swatch.release-in {
  width: 24px;
  height: 14px;
  border-top: 3px dashed #172b4d;
  background: transparent;
}
.legend-swatch.release-out {
  width: 24px;
  height: 14px;
  border-top: 3px dashed #ffc400;
  background: transparent;
}
.legend-swatch.milestone {
  width: 14px;
  height: 14px;
  border: none;
  background: transparent;
  vertical-align: middle;
}
.legend-swatch.today {
  width: 14px;
  height: 14px;
  border: none;
  background: transparent;
  vertical-align: middle;
}
.chart-key-row .chart-key-milestone-letter {
  display: inline-block;
  padding-left: 22px;
}
.chart-key-wrap abbr.metric-tip {
  cursor: help;
  text-decoration: none;
}
.chart-key-wrap abbr.metric-tip strong {
  text-decoration: none;
}
.chart-milestones .milestone-tip {
  position: relative;
  cursor: help;
  display: inline-block;
  max-width: 100%;
}
.milestone-tip-pop {
  display: none;
  position: absolute;
  left: 0;
  top: calc(100% + 6px);
  z-index: 30;
  min-width: 280px;
  max-width: min(420px, 90vw);
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #ffffff;
  box-shadow: 0 8px 24px rgba(9, 30, 66, 0.18);
  color: var(--text);
  font-size: 12px;
  line-height: 1.45;
  text-align: left;
  white-space: normal;
}
.milestone-tip:hover .milestone-tip-pop,
.milestone-tip:focus-within .milestone-tip-pop {
  display: block;
}
.milestone-tip-desc {
  margin: 0 0 8px;
  color: var(--text);
}
.milestone-tip-heading {
  margin: 8px 0 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--muted);
}
.milestone-tip-pop ul {
  margin: 0 0 4px;
  padding-left: 18px;
}
.milestone-tip-pop li {
  margin: 2px 0;
}
.milestone-tip-note {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 11px;
}
.milestone-letter-link {
  color: #de350b;
  font-weight: 700;
  text-decoration: none;
}
.milestone-letter-link:hover {
  text-decoration: underline;
}
.chart-wrap svg a.chart-milestone-link {
  cursor: pointer;
}
.chart-wrap svg a.chart-milestone-link:hover line.chart-milestone-line {
  stroke-width: 3.5;
  opacity: 1;
}
.legend-swatch.earned {
  width: 20px;
  height: 14px;
  border-top: 3px solid #0052cc;
  background: transparent;
}
.legend-swatch.goal {
  width: 20px;
  height: 14px;
  border-top: 3px dashed #6b778c;
  background: transparent;
}
.legend-swatch.lane-ec { background: #4d9cff; }
.legend-swatch.lane-int { background: #9b7aff; }
.legend-swatch.lane-data { background: #3ddb7a; }
.legend-swatch.lane-unassigned { background: #ffcc33; }
.legend-swatch.global-line { border-top: 3px solid #0052cc; width: 16px; height: 0; margin-bottom: 4px; background: transparent; }
.footnote { color: var(--muted); font-size: 12px; margin-top: 12px; line-height: 1.5; }

.breadcrumb, .report-nav {
  font-size: 13px;
  line-height: 1.5;
  margin: 0 0 16px;
  color: #5e6c84;
}
.breadcrumb a, .report-nav a {
  color: #0052cc;
  text-decoration: none;
  font-weight: 600;
}
.breadcrumb a:hover, .report-nav a:hover { text-decoration: underline; }
.breadcrumb .sep, .report-nav .sep { margin: 0 0.35em; color: #97a0af; }
.breadcrumb .current, .report-nav .current { color: #172b4d; font-weight: 600; }

.report-shell {
    max-width: none;
    width: min(100vw - 8px, 2200px);
    padding: 16px 4px 24px;
}
.chart-wrap-sef-plan.chart-wrap-timeline {
    max-height: none;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: hidden;
}
.chart-wrap-sef-plan svg {
  display: block;
  width: 100%;
  height: auto;
  min-width: 0;
  max-width: 100%;
}
.chart-wrap-sef-plan svg a text {
  text-decoration: none;
}
.chart-wrap-sef-plan svg a:hover text {
  text-decoration: underline;
}
.sef-phase-divider {
  fill: #f4f5f7;
}
</style>
</head>
